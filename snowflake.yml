definition_version: "2"

entities:
  ANDE_APP:
    type: snowflake-app
    identifier:
      name: ANDE_APP
      database: ANDE_DB
      schema: PUBLIC
    artifacts:
      - src: ./*
        dest: ./
        ignore:
          - node_modules
          - .env*
          - __pycache__
          - "*.pyc"
          - .next
          - .git
          - snowflake.log

    query_warehouse: ADHOC_WH
    build_compute_pool:
      name: ANDE_COMPUTE_POOL
    service_compute_pool:
      name: ANDE_COMPUTE_POOL
    build_eai:
      name: ALLOW_ALL_EAI
    code_workspace: USER$ADMIN.PUBLIC.SNOWFLAKE_APPS
